name: release-please

# Workflow security note (for reviewers):
# This workflow does NOT interpolate any github.event.*.title / body / message
# fields into run: commands. The only ${{ }} expressions are:
#   - steps.release.outputs.release_created (boolean from googleapis/release-please-action)
#   - secrets.GITHUB_TOKEN (write-scoped, used by the action only)
# npm publish authenticates via OIDC Trusted Publishing (id-token: write),
# not a long-lived NPM_TOKEN. The OIDC token is minted per-run, bound to
# this workflow + ref, and expires in minutes; no secret to leak.
# No untrusted input flows into a shell.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  # Required for npm OIDC Trusted Publishing: lets this run mint a
  # short-lived OIDC token that npm verifies against the trusted publisher
  # config (repo + workflow path + ref) on the package side.
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Step 1: open or update the release PR.
      # When that PR merges, release-please tags the release and sets
      # `release_created: true` on this same workflow run.
      - uses: googleapis/release-please-action@v4
        id: release

      # Steps below only run when a release was actually created
      # (i.e. when this run is the post-merge of the release PR).
      # On every other push to main, release-please just updates the
      # open release PR and exits.

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      # pnpm/action-setup must come BEFORE actions/setup-node so the latter
      # can find `pnpm` on PATH to enable its pnpm-store cache.
      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # npm 11.5.1+ is required for OIDC Trusted Publishing. Node 22 LTS
      # bundles npm 10.x, which silently falls back to "no token, no publish"
      # if you don't bump it. Pin to the 11.x line so future Node updates
      # don't quietly regress us.
      - run: npm install -g npm@^11.5.1
        if: ${{ steps.release.outputs.release_created }}

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.release.outputs.release_created }}

      - run: pnpm test
        if: ${{ steps.release.outputs.release_created }}

      # Explicit build step (also runs via package.json's prepublishOnly,
      # but doing it here surfaces build errors before the publish step).
      - run: pnpm build
        if: ${{ steps.release.outputs.release_created }}

      # `npm publish` (not `pnpm publish`) is the publish path: npm has
      # first-class OIDC Trusted Publishing support and emits a provenance
      # attestation that consumers can verify with `npm audit signatures`.
      # No NODE_AUTH_TOKEN: npm 11+ auto-detects the GitHub Actions OIDC
      # token from the runner environment when `id-token: write` is set
      # at the job level and the package is configured for the matching
      # trusted publisher on npmjs.com.
      - run: npm publish --access public --provenance
        if: ${{ steps.release.outputs.release_created }}
