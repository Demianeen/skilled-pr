name: release-please

# Workflow security note (for reviewers):
# This workflow does NOT interpolate any github.event.*.title / body / message
# fields into run: commands. The only ${{ }} expressions are:
#   - steps.release.outputs.release_created (boolean from googleapis/release-please-action)
#   - secrets.GITHUB_TOKEN (write-scoped, used by the action only)
#   - secrets.NPM_TOKEN (consumed via env: NODE_AUTH_TOKEN, never echoed)
# No untrusted input flows into a shell.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Step 1: open or update the release PR.
      # When that PR merges, release-please tags the release and sets
      # `release_created: true` on this same workflow run.
      - uses: googleapis/release-please-action@v4
        id: release

      # Steps below only run when a release was actually created
      # (i.e. when this run is the post-merge of the release PR).
      # On every other push to main, release-please just updates the
      # open release PR and exits.

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      # pnpm/action-setup must come BEFORE actions/setup-node so the latter
      # can find `pnpm` on PATH to enable its pnpm-store cache.
      # Version is read from package.json's `packageManager` field
      # (pnpm@9.0.0). Specifying `version:` here in addition causes
      # pnpm/action-setup@v4 to refuse with ERR_PNPM_BAD_PM_VERSION as of
      # late 2025; the action treats duplicate version sources as a
      # configuration error to prevent silent drift.
      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.release.outputs.release_created }}

      - run: pnpm test
        if: ${{ steps.release.outputs.release_created }}

      # Explicit build step (also runs via package.json's prepublishOnly,
      # but doing it here surfaces build errors before the publish step).
      - run: pnpm build
        if: ${{ steps.release.outputs.release_created }}

      # `npm publish` (not `pnpm publish`) is the publish path: it has the
      # most reliable NODE_AUTH_TOKEN handling and is what setup-node's
      # `registry-url` is wired for.
      - run: npm publish --access public
        if: ${{ steps.release.outputs.release_created }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
