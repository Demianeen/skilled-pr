# Auto-generated by `skilled-pr enable-gate`.
#
# This workflow fires on pull_request events and runs `skilled-pr ci-resolve`
# to evaluate the active rules from .skilledpr/config.jsonc (read from the
# BASE branch — see the checkout step). Branch protection requires the
# UNION of contexts across defaults + every rule, so for each PR:
#
#   - Skills the PR's resolved profile requires → `pending` status with a
#     CTA directing the contributor to invoke the skill in Claude Code or
#     Codex. `skilled-pr attest` (run inside the agent session) replaces
#     it with the final success/failure.
#
#   - Every other registered context → `success` ("not required for this
#     PR"), so branch protection isn't left waiting on a context nothing
#     will post. A rule with `requiredSkills: []` is the full-bypass case:
#     every context gets the not-required success and the PR is mergeable
#     from CI alone.
#
# The version pin below is set at `skilled-pr enable-gate` time. To refresh
# after upgrading the CLI, run `skilled-pr migrate --apply` or re-run
# `skilled-pr enable-gate`.

name: skilled-pr bypass

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

# Concurrency: cancel earlier runs for the same PR — only the latest
# event reflects the current rule resolution.
concurrency:
  group: skilled-pr-bypass-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      # Required for `gh api repos/.../statuses/<sha>` POST.
      statuses: write
      # Required for `gh api repos/.../pulls/<n>` GET.
      pull-requests: read
      # Required because actions/checkout reads the repo (the workflow
      # never writes back).
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # SECURITY: check out the BASE branch, not the PR's merge ref
          # (the default on pull_request events). ci-resolve reads
          # .skilledpr/config.jsonc from this checkout to decide whether
          # the PR may skip review — if that config came from the PR
          # itself, any PR could add a bypass rule for its own branch and
          # approve itself. The gate's rules must come from the trusted
          # base. Consequence: a PR that edits the rules only affects PRs
          # opened AFTER it merges.
          ref: ${{ github.event.pull_request.base.ref }}
          # We only need .skilledpr/config.jsonc — shallow checkout is fine.
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve rules and post status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx -y -p skilled-pr@__SKILLED_PR_VERSION__ \
            skilled-pr ci-resolve \
            --pr ${{ github.event.pull_request.number }} \
            --post
